    <style>

        }
        body {
            font-family: 'Tajawal', sans-serif;

        /* Math formatting: Left to Right */
        .math-ltr {

</head>

                    السؤال التالي
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 rotate-180" viewBox="0 0 20 20" fill="currentColor">

                    </svg>
                </button>

                <div class="relative bg-slate-900/90 p-16 rounded-[4rem] border-2 border-cyan-500/20 shadow-2xl">
                    <div class="text-9xl font-black text-white" id="final-points">0</div>
                    <div class="text-cyan-400 font-bold mt-4 uppercase tracking-widest text-xl">من أصل 30</div>

                تمنياتي لكم بالتوفيق ….. أ/محمد القرني
            </div>
            
            <button onclick="location.reload()" class="mt-12 text-slate-500 hover:text-white underline font-bold transition-all">إعادة المحاولة بأسئلة مختلفة</button>
        </div>
    </div>

    <script>
        // Game Logic State
        let playerFullName = "";
        let masterQuestionBank = [];
        let currentSessionQuestions = [];
        let currentIndex = 0;
        let sessionScore = 0;
        let timeLeft = 30;
        let timerTicker = null;

        const mathWrap = (v) => `<span class="math-ltr">${v}</span>`;
        const shuffleArray = (a) => a.sort(() => Math.random() - 0.5);

        // Generate 500 questions bank (Variations of topics)
        function createMasterBank() {
            const bank = [];
            
            // Topic 1: Sample Space (100 variants)
            for(let i=1; i<=100; i++) {
                const s = [2, 4, 6, 8, 12][i % 5];
                const n = (i % 3) + 2;
                const ans = Math.pow(s, n);
                bank.push({
                    q: `عند رمي مجسم مرقم ذو ${mathWrap(s)} وجهاً عدد ${mathWrap(n)} مرات، ما عدد عناصر فضاء العينة؟`,
                    options: [ans, s*n, Math.pow(n, s), ans + 8],
                    correct: ans
                });
            }

            // Topic 2: Permutations & Combinations (100 variants)
            for(let i=1; i<=100; i++) {
                const n = 6 + (i % 7);
                const r = 3;
                const f = (x) => x <= 1 ? 1 : x * f(x-1);
                const nCr = f(n) / (f(r) * f(n-r));
                const nPr = f(n) / f(n-r);
                if(i % 2 === 0) {
                    bank.push({
                        q: `يراد اختيار مجموعة من ${mathWrap(r)} طلاب من أصل ${mathWrap(n)}، عدد الطرق هو:`,
                        options: [nCr, nPr, n*r, n+r],
                        correct: nCr
                    });
                } else {
                    bank.push({
                        q: `بكم طريقة يمكن ترتيب ${mathWrap(n)} كتب في رف واحد؟`,
                        options: [f(n), f(n-1), n*2, n*n],
                        correct: f(n)
                    });
                }
            }

            // Topic 3: Geometric Probability (100 variants)
            for(let i=1; i<=100; i++) {
                const total = 40 + i;
                const part = 5 + (i % 12);
                const prob = (part/total).toFixed(2);
                bank.push({
                    q: `نقطة تقع عشوائياً على قطعة مستقيمة طولها ${mathWrap(total)}، ما احتمال وقوعها على جزء طوله ${mathWrap(part)}؟`,
                    options: [prob, (1-prob).toFixed(2), "0.50", "0.20"],
                    correct: prob
                });
            }

            // Topic 4: Independent/Dependent (100 variants)
            for(let i=1; i<=100; i++) {
                const p1 = (0.2 + (i % 4)*0.1).toFixed(1);
                const p2 = (0.3 + (i % 3)*0.1).toFixed(1);
                const res = (p1 * p2).toFixed(2);
                bank.push({
                    q: `إذا كانت الحوادث ${mathWrap('A, B')} مستقلة، ${mathWrap('P(A)='+p1)} و ${mathWrap('P(B)='+p2)}، فإن ${mathWrap('P(A ∩ B)')} هو:`,
                    options: [res, (parseFloat(p1)+parseFloat(p2)).toFixed(1), "1.00", "0.00"],
                    correct: res
                });
            }

            // Topic 5: Mutually Exclusive / Pairs (100 variants)
            for(let i=1; i<=100; i++) {
                if(i % 2 === 0) {
                    const a = 0.35, b_v = 0.25;
                    const res = (a + b_v).toFixed(2);
                    bank.push({
                        q: `حادثتان متنافيتان، إذا كان ${mathWrap('P(A)='+a)} و ${mathWrap('P(B)='+b_v)}، فما قيمة ${mathWrap('P(A ∪ B)')}؟`,
                        options: [res, (a*b_v).toFixed(2), "0.10", "1.00"],
                        correct: res
                    });
                } else {
                    const x = i - 55;
                    const y = i + 15;
                    const xS = x < 0 ? `-${Math.abs(x)}` : `${x}`;
                    const yS = y < 0 ? `-${Math.abs(y)}` : `${y}`;
                    bank.push({
                        q: `تمثيل نقطة في نظام إحداثي بقيم ${mathWrap('x=' + xS)} و ${mathWrap('y=' + yS)} هو الزوج المرتب:`,
                        options: [mathWrap(`(${xS}, ${yS})`), mathWrap(`(${yS}, ${xS})`), mathWrap(`(${xS}, 0)`), mathWrap(`(0, ${yS})`)],
                        correct: mathWrap(`(${xS}, ${yS})`)
                    });
                }
            }
            return bank;
        }

        function bootQuiz() {
            const name = document.getElementById('input-full-name').value.trim();
            if (name.split(' ').length < 3) {
                alert("يرجى إدخال اسمك الثلاثي كاملاً للدخول.");
                return;
            }
            playerFullName = name;
            
            masterQuestionBank = createMasterBank();
            currentSessionQuestions = shuffleArray(masterQuestionBank).slice(0, 30);
            
            currentIndex = 0;
            sessionScore = 0;
            
            document.getElementById('screen-intro').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentSessionQuestions[currentIndex];
            document.getElementById('label-q-count').innerText = `السؤال ${currentIndex + 1} / 30`;
            document.getElementById('label-score').innerText = `النقاط: ${sessionScore}`;
            document.getElementById('question-text').innerHTML = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            document.getElementById('btn-next-container').classList.add('hidden');

            const choices = shuffleArray([...q.options]);
            choices.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-node px-6 py-5 rounded-2xl font-bold text-xl transition-all";
                btn.innerHTML = opt.toString().includes('span') ? opt : mathWrap(opt);
                btn.onclick = () => checkResponse(opt, q.correct, btn);
                grid.appendChild(btn);
            });

            resetTimer();
        }

        function resetTimer() {
            clearInterval(timerTicker);
            timeLeft = 30;
            updateTimerUI();
            timerTicker = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if(timeLeft <= 0) {
                    clearInterval(timerTicker);
                    onTimeOut();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const valEl = document.getElementById('timer-val');
            const barEl = document.getElementById('timer-indicator');
            valEl.innerText = timeLeft;
            barEl.style.width = `${(timeLeft / 30) * 100}%`;
            
            if(timeLeft <= 5) valEl.classList.add('text-red-500');
            else valEl.classList.remove('text-red-500');
        }

        function checkResponse(choice, correct, btn) {
            clearInterval(timerTicker);
            const btns = document.querySelectorAll('.option-node');
            btns.forEach(b => b.disabled = true);

            if(choice == correct) {
                btn.classList.add('correct-ans');
                sessionScore++;
            } else {
                btn.classList.add('wrong-ans');
            }
            document.getElementById('btn-next-container').classList.remove('hidden');
        }

        function onTimeOut() {
            const btns = document.querySelectorAll('.option-node');
            btns.forEach(b => {
                b.disabled = true;
                b.classList.add('opacity-40');
            });
            document.getElementById('btn-next-container').classList.remove('hidden');
        }

        function proceedNext() {
            currentIndex++;
            if(currentIndex < 30) {
                renderQuestion();
            } else {
                displayFinalResults();
            }
        }

        function displayFinalResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('result-user-name').innerText = `أحسنت يا ${playerFullName}، لقد أتممت الاختبار بنجاح.`;
            document.getElementById('final-points').innerText = sessionScore;
        }
    </script>
</body>
</html>
